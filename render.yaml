databases:
  - name: vinentoai-db
    databaseName: vinentoai
    user: vinentoai
    plan: free

services:
  - type: web
    name: vinentoai-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinentoai-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: SECRET_KEY
        generateValue: true

