databases:
  - name: vinentoai-db
    databaseName: vinentoai
    user: vinentoai
    plan: free

services:
  - type: web
    name: vinentoai-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vinentoai-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://resume-parser-ai-red.vercel.app"
      - key: GOOGLE_CLIENT_ID
        value: "180043284369-jufm27kbvrt8dd5ktm6g9q8aodr69cv6.apps.googleusercontent.com"


